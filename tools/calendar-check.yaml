name: calendar-check
description: Check founder's calendar availability for meeting booking. Returns available time slots within a specified date range and timezone.
version: 1.0.0
input_schema:
  type: object
  properties:
    date_range:
      type: object
      description: Date range to check availability
      properties:
        from:
          type: string
          format: date
          description: Start date (ISO 8601)
        to:
          type: string
          format: date
          description: End date (ISO 8601)
      required: [from, to]
    timezone:
      type: string
      description: Visitor's timezone (e.g., "America/New_York")
    meeting_type:
      type: string
      enum: [discovery, demo, follow_up]
      description: Type of meeting to book
    duration_minutes:
      type: integer
      enum: [15, 20, 30, 45, 60]
      default: 20
      description: Meeting duration in minutes
  required: [date_range, timezone]
output_schema:
  type: object
  properties:
    available_slots:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
            format: date-time
          end:
            type: string
            format: date-time
          calendar_link:
            type: string
            format: uri
    founder_name:
      type: string
    calendar_provider:
      type: string
      enum: [calendly, cal_com, google_calendar]
implementation:
  type: webhook
  url: "${CALENDAR_WEBHOOK_URL}"
  timeout: 10
annotations:
  requires_confirmation: true
  read_only: true
  cost: low
  used_by_skill: meeting-book
