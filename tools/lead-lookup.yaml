name: lead-lookup
description: Look up existing lead records by name, email, or company. Returns lead history, fit score, and previous interactions to maintain conversation continuity.
version: 1.0.0
input_schema:
  type: object
  properties:
    query:
      type: string
      description: Search query — visitor name, email, or company name
    lookup_type:
      type: string
      enum: [name, email, company, id]
      default: name
      description: Type of lookup to perform
    include_history:
      type: boolean
      default: true
      description: Whether to include past interaction history
  required: [query]
output_schema:
  type: object
  properties:
    found:
      type: boolean
    lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        company:
          type: string
        email:
          type: string
        fit_score:
          type: string
          enum: [strong, medium, weak]
        use_case:
          type: string
        interaction_count:
          type: integer
        last_interaction:
          type: string
          format: date-time
        next_action:
          type: string
          enum: [meeting-book, self-serve, disqualify, escalate]
        corrections_applied:
          type: integer
    interactions:
      type: array
      items:
        type: object
        properties:
          timestamp:
            type: string
            format: date-time
          skill_used:
            type: string
          summary:
            type: string
implementation:
  type: script
  path: scripts/lead-lookup.js
  runtime: node
  timeout: 5
annotations:
  requires_confirmation: false
  read_only: true
  cost: low
  used_by_skill: lead-qualify
