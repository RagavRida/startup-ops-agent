<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria - Startup Ops Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Aria</h1>
        <p class="subtitle">Startup Ops Agent (MCP-ready)</p>
        <button id="refreshTools">Refresh Tool Status</button>
        <div id="toolStatus" class="tool-status"></div>
      </aside>

      <main class="chat">
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <input id="messageInput" type="text" placeholder="Ask Aria to qualify, book, escalate, or create a meet..." />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
