spec_version: "0.1.0"
name: startup-ops-agent
version: 1.1.0
description: "An AI employee that qualifies leads, onboards users, handles objections, and books meetings — autonomously, with built-in self-correction."
model:
  preferred: openrouter:anthropic/claude-opus-4
  fallback:
    - openrouter:anthropic/claude-sonnet-4
    - openrouter:anthropic/claude-3.5-sonnet
  constraints:
    temperature: 0.4
    max_tokens: 1024

skills:
  - lead-qualify
  - user-onboard
  - meeting-book
  - objection-handle
  - self-correct

tools:
  - calendar-check
  - lead-lookup
  - send-notification
  - google-meet-create

tags:
  - startup
  - sales
  - onboarding
  - lead-qualification
  - ops
  - automation
  - self-correction
  - compliance
