# Production Configuration — Aria
# Overrides for production deployment.

runtime:
  max_turns: 50
  timeout: 120

model:
  provider: openrouter
  name: anthropic/claude-sonnet-4      # Primary model for production
  fallback:
    - anthropic/claude-3.5-sonnet
    - openai/gpt-4o
  constraints:
    temperature: 0.4
    max_tokens: 1024

features:
  self_correction: true                 # Always on in production
  audit_logging: true                   # Always on in production
  memory_persistence: true
  escalation_alerts: true

notification:
  channels: [webhook, email]
  escalation_sla: 4h

logging:
  level: warn
  format: structured_json
