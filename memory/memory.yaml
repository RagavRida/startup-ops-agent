# Memory Configuration — Aria
# Per gitagent spec: defines memory layers, triggers, and archive policy.

layers:
  - name: working
    path: MEMORY.md
    max_lines: 200
    format: markdown
    description: "Current state — active leads, recent decisions, session context"

  - name: runtime
    path: runtime/
    format: markdown
    files:
      - runtime/dailylog.md    # Chronological interaction log
      - runtime/context.md     # Persistent context across sessions
    description: "Live operational state — updated during each session"

  - name: archive
    path: archive/
    format: yaml
    rotation: monthly
    description: "Historical snapshots of working memory"

update_triggers:
  - on_session_end          # Flush working memory after each conversation
  - on_explicit_save        # Manual save via hook or command
  - on_escalation           # Snapshot state when escalation occurs
  - on_lead_qualified       # Record qualified lead data

archive_policy:
  max_entries: 500
  compress_after: 90d       # Compress entries older than 90 days
  retention: 1y             # Keep archives for 1 year (matches audit policy)
  format: yaml              # Archive format

commit_policy:
  auto_commit: false        # Don't auto-commit memory changes
  branch: main              # Memory updates go to main branch
  message_template: "memory: update working memory — {session_id}"
